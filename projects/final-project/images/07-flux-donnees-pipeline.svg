<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334155"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="1000" height="520" rx="10" fill="#f8fafc"/>
  <rect width="1000" height="46" rx="10" fill="#1e293b"/>
  <rect y="36" width="1000" height="10" fill="#1e293b"/>
  <text x="500" y="30" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Flux de Données — Pipeline Temps Réel (10 Hz)</text>

  <!-- Stage 1: ADC -->
  <g filter="url(#s)">
    <rect x="30" y="80" width="150" height="160" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="105" y="105" text-anchor="middle" fill="#92400e" font-size="13" font-weight="bold">1. ADC</text>
    <text x="105" y="120" text-anchor="middle" fill="#a16207" font-size="10">Échantillonnage</text>
    <line x1="45" y1="128" x2="165" y2="128" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <text x="50" y="148" fill="#92400e" font-size="9">CH0: V_panel</text>
    <text x="50" y="165" fill="#92400e" font-size="9">CH1: V_batterie</text>
    <text x="50" y="182" fill="#92400e" font-size="9">CH2: I_panel</text>
    <text x="50" y="199" fill="#92400e" font-size="9">CH3: I_charges</text>
    <rect x="45" y="212" width="110" height="18" rx="3" fill="#fbbf24"/>
    <text x="100" y="225" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Moy. glissante 8pts</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="160" x2="220" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="200" y="150" text-anchor="middle" fill="#64748b" font-size="8">4× uint32</text>

  <!-- Stage 2: ENERGY -->
  <g filter="url(#s)">
    <rect x="225" y="80" width="150" height="160" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="300" y="105" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">2. ENERGY</text>
    <text x="300" y="120" text-anchor="middle" fill="#2563eb" font-size="10">Calculs</text>
    <line x1="240" y1="128" x2="360" y2="128" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <text x="240" y="148" fill="#1e40af" font-size="9">→ V, I en mV/mA</text>
    <text x="240" y="165" fill="#1e40af" font-size="9">→ P_solar (mW)</text>
    <text x="240" y="182" fill="#1e40af" font-size="9">→ P_load (mW)</text>
    <text x="240" y="199" fill="#1e40af" font-size="9">→ P_net (bilan)</text>
    <rect x="240" y="212" width="110" height="18" rx="3" fill="#2563eb"/>
    <text x="295" y="225" text-anchor="middle" fill="white" font-size="9" font-weight="bold">SOC 0-100%</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="375" y1="160" x2="415" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="395" y="150" text-anchor="middle" fill="#64748b" font-size="8">energy_t</text>

  <!-- Stage 3: FSM -->
  <g filter="url(#s)">
    <rect x="420" y="80" width="150" height="160" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="495" y="105" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="bold">3. FSM</text>
    <text x="495" y="120" text-anchor="middle" fill="#7c3aed" font-size="10">Décision</text>
    <line x1="435" y1="128" x2="555" y2="128" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <circle cx="445" cy="148" r="5" fill="#22c55e"/><text x="458" y="152" fill="#5b21b6" font-size="9">NORMAL</text>
    <circle cx="445" cy="168" r="5" fill="#eab308"/><text x="458" y="172" fill="#5b21b6" font-size="9">LOW_BAT</text>
    <circle cx="445" cy="188" r="5" fill="#ef4444"/><text x="458" y="192" fill="#5b21b6" font-size="9">CRITICAL</text>
    <circle cx="445" cy="208" r="5" fill="#1e293b"/><text x="458" y="212" fill="#5b21b6" font-size="9">SHUTDOWN</text>
    <text x="495" y="232" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="bold">Hystérésis ±10%</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="160" x2="610" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="590" y="150" text-anchor="middle" fill="#64748b" font-size="8">state</text>

  <!-- Stage 4: ACTUATORS -->
  <g filter="url(#s)">
    <rect x="615" y="80" width="150" height="160" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="690" y="105" text-anchor="middle" fill="#166534" font-size="13" font-weight="bold">4. ACTUATORS</text>
    <text x="690" y="120" text-anchor="middle" fill="#16a34a" font-size="10">Application</text>
    <line x1="630" y1="128" x2="750" y2="128" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <rect x="630" y="140" width="120" height="20" rx="3" fill="#fbbf24"/><text x="690" y="155" text-anchor="middle" fill="white" font-size="9" font-weight="bold">LOAD 1: ON/OFF</text>
    <rect x="630" y="165" width="120" height="20" rx="3" fill="#60a5fa"/><text x="690" y="180" text-anchor="middle" fill="white" font-size="9" font-weight="bold">LOAD 2: ON/OFF</text>
    <rect x="630" y="190" width="120" height="20" rx="3" fill="#f472b6"/><text x="690" y="205" text-anchor="middle" fill="white" font-size="9" font-weight="bold">LOAD 3: ON/OFF</text>
    <text x="690" y="232" text-anchor="middle" fill="#16a34a" font-size="9">→ GPIO MOSFET</text>
  </g>

  <!-- Stage 5: OUTPUT -->
  <g filter="url(#s)">
    <rect x="810" y="80" width="160" height="160" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="890" y="105" text-anchor="middle" fill="#166534" font-size="13" font-weight="bold">5. OUTPUT</text>
    <text x="890" y="120" text-anchor="middle" fill="#16a34a" font-size="10">Reporting</text>
    <line x1="825" y1="128" x2="955" y2="128" stroke="#16a34a" stroke-width="1" opacity="0.3"/>
    <text x="825" y="148" fill="#166534" font-size="9">UART: status 1Hz</text>
    <text x="825" y="165" fill="#166534" font-size="9">LEDs: V/O/R</text>
    <text x="825" y="182" fill="#166534" font-size="9">Logger: CSV 1/min</text>
    <text x="825" y="199" fill="#166534" font-size="9">Diagnostic: cmd 'd'</text>
    <text x="825" y="216" fill="#166534" font-size="9">Export: cmd 'l'</text>
  </g>
  <line x1="765" y1="160" x2="805" y2="160" stroke="#334155" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- MPPT Branch -->
  <g filter="url(#s)">
    <rect x="300" y="290" width="160" height="80" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="380" y="315" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="bold">MPPT P&amp;O</text>
    <text x="380" y="335" text-anchor="middle" fill="#7c3aed" font-size="10">Perturb &amp; Observe</text>
    <text x="380" y="355" text-anchor="middle" fill="#8b5cf6" font-size="9">Intervalle: 10 sec</text>
  </g>
  <line x1="300" y1="240" x2="350" y2="288" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="310" y="268" fill="#7c3aed" font-size="8">V,I panel</text>
  <line x1="460" y1="320" x2="615" y2="200" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="540" y="270" fill="#7c3aed" font-size="8">PWM duty%</text>

  <!-- LOGGER Branch -->
  <g filter="url(#s)">
    <rect x="540" y="290" width="160" height="80" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="620" y="315" text-anchor="middle" fill="#c2410c" font-size="12" font-weight="bold">LOGGER</text>
    <text x="620" y="335" text-anchor="middle" fill="#ea580c" font-size="10">Ring Buffer 128 entrées</text>
    <text x="620" y="355" text-anchor="middle" fill="#f97316" font-size="9">Intervalle: 60 sec</text>
  </g>
  <line x1="495" y1="240" x2="570" y2="288" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="520" y="268" fill="#ea580c" font-size="8">state, SOC, P</text>
  <line x1="700" y1="320" x2="810" y2="200" stroke="#ea580c" stroke-width="1.5" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="760" y="270" fill="#ea580c" font-size="8">export CSV</text>

  <!-- Timing bar -->
  <rect x="30" y="410" width="940" height="80" rx="8" fill="#1e293b"/>
  <text x="500" y="435" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Chronogramme des Interruptions (SysTick 1 kHz)</text>

  <!-- Tick marks -->
  <g fill="#94a3b8" font-size="9">
    <rect x="60" y="450" width="60" height="25" rx="4" fill="#ef4444"/><text x="90" y="467" text-anchor="middle" fill="white" font-size="9" font-weight="bold">1 ms</text>
    <text x="60" y="487" fill="#94a3b8" font-size="8">SysTick tick</text>

    <rect x="180" y="450" width="100" height="25" rx="4" fill="#f59e0b"/><text x="230" y="467" text-anchor="middle" fill="white" font-size="9" font-weight="bold">100 ms (10 Hz)</text>
    <text x="180" y="487" fill="#94a3b8" font-size="8">ADC→Energy→FSM→Load</text>

    <rect x="340" y="450" width="100" height="25" rx="4" fill="#22c55e"/><text x="390" y="467" text-anchor="middle" fill="white" font-size="9" font-weight="bold">1 sec (1 Hz)</text>
    <text x="340" y="487" fill="#94a3b8" font-size="8">Display UART status</text>

    <rect x="500" y="450" width="110" height="25" rx="4" fill="#8b5cf6"/><text x="555" y="467" text-anchor="middle" fill="white" font-size="9" font-weight="bold">10 sec (0.1 Hz)</text>
    <text x="500" y="487" fill="#94a3b8" font-size="8">MPPT ajustement</text>

    <rect x="670" y="450" width="120" height="25" rx="4" fill="#ea580c"/><text x="730" y="467" text-anchor="middle" fill="white" font-size="9" font-weight="bold">60 sec (1/min)</text>
    <text x="670" y="487" fill="#94a3b8" font-size="8">Logger historique</text>

    <rect x="850" y="450" width="100" height="25" rx="4" fill="#334155"/><text x="900" y="467" text-anchor="middle" fill="#94a3b8" font-size="9">Async</text>
    <text x="850" y="487" fill="#94a3b8" font-size="8">Commandes UART</text>
  </g>
</svg>
